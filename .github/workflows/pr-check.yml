name: PR check

on:
  pull_request:
    branches: [main]

jobs:
  quick-check:
    name: Quick check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck || true
      - run: npm test -- --reporter=dot
      - run: npm run audit:content
